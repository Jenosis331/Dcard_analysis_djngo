{% extends 'base.html' %}

{% block title %}{{ active_theme }}輿情觀測 — 情境聲量總覽{% endblock %}

{% block extra_css %}
<style>
  .page-hero {
    background: var(--brand-gradient);
    border-radius: var(--radius-card);
    padding: 1.5rem 2rem;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1.2rem;
  }
  .hero-icon {
    width: 54px; height: 54px; flex-shrink: 0;
    background: rgba(255,255,255,0.18); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; color: #fff;
  }
  .page-hero h1 { font-size: 1.35rem; font-weight: 800; color: #fff; margin: 0; }
  .page-hero p  { color: rgba(255,255,255,0.75); margin: 0.2rem 0 0; font-size: 0.82rem; }
  .hero-badge {
    margin-left: auto; background: rgba(255,255,255,0.14);
    color: #fff; border-radius: 2rem; padding: 0.28rem 0.85rem;
    font-size: 0.73rem; white-space: nowrap;
  }
  .card-hdr {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.78rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-secondary);
  }
  .card-hdr i { color: var(--brand-color); font-size: 0.95rem; }
  .rank-list { list-style: none; padding: 0; margin: 0; }
  .rank-item {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.5rem 0.4rem; border-bottom: 1px solid var(--border-color);
    font-size: 0.86rem; border-radius: 0.35rem;
    transition: background 0.12s;
  }
  .rank-item:last-child { border-bottom: none; }
  .rank-item:hover { background: #f0f2f8; }
  .rank-num {
    width: 1.65rem; height: 1.65rem; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .donut-legend { list-style: none; padding: 0; margin: 0; }
  .donut-legend li {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.25rem 0; font-size: 0.82rem;
    border-bottom: 1px dashed var(--border-color);
  }
  .donut-legend li:last-child { border-bottom: none; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { flex: 1; font-weight: 500; }
  .legend-pct  { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
</style>
{% endblock %}

{% block content %}
<div class="page-hero">
  <div class="hero-icon"><i class="bi bi-pie-chart-fill"></i></div>
  <div>
    <h1>情境聲量總覽</h1>
    <p>各情境佔比分佈 · 討論板分布統計</p>
  </div>
  <div class="hero-badge d-none d-md-block">
    <i class="bi bi-database-fill me-1"></i>資料來源：Dcard {{ active_theme }}相關討論
  </div>
</div>

<div class="row g-3 mb-3">
  <div class="col-lg-5">
    <div class="card h-100">
      <div class="card-header">
        <span class="card-hdr"><i class="bi bi-pie-chart-fill"></i>情境佔比分佈</span>
      </div>
      <div class="card-body d-flex align-items-center gap-3 flex-wrap">
        <div style="position:relative;width:200px;height:200px;flex-shrink:0;">
          <canvas id="chart-donut"></canvas>
        </div>
        <ul class="donut-legend flex-fill" id="donut-legend"></ul>
      </div>
    </div>
  </div>
  <div class="col-lg-7">
    <div class="card h-100">
      <div class="card-header">
        <span class="card-hdr"><i class="bi bi-layout-sidebar-inset"></i>討論板分佈（Top 12）</span>
      </div>
      <div class="card-body">
        <canvas id="chart-category" style="max-height:280px;"></canvas>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
<script>
// ==========================================
// 1. 資料初始化與全域設定
// ==========================================

// 接收來自 Django 後端的變數 (注意：如果資料有引號或特殊字元，使用 |safe 是對的，但通常會轉成 JSON 格式)
const SCENARIO_RANKING = {{ scenario_ranking|safe }};

// 定義 10 種主題顏色
const PALETTE = [
  '#3949ab','#e53935','#43a047','#fb8c00','#8e24aa',
  '#00acc1','#6d4c41','#1e88e5','#f4511e','#39796b',
];

// 將 HEX 16進位色碼轉換為 RGBA 格式，以支援透明度
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), 
        g = parseInt(hex.slice(3,5),16), 
        b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ==========================================
// 2. 處理情境排行榜資料 (供甜甜圈圖使用)
// ==========================================

// 將 SCENARIO_RANKING 陣列拆解成名稱 (orgs) 與數量 (mentions) 兩個獨立陣列
const orgs     = SCENARIO_RANKING.map(d => d.scenario);
const mentions = SCENARIO_RANKING.map(d => d.article_count);
// 計算所有文章總數，供計算百分比使用
const total    = mentions.reduce((a,b) => a + b, 0);

// ==========================================
// 3. 繪製甜甜圈圖 (Doughnut Chart)
// ==========================================
new Chart(document.getElementById('chart-donut').getContext('2d'), {
  type: 'doughnut',
  data: {
    labels: orgs, // 標籤：情境名稱
    datasets: [{
      data: mentions, // 數據：文章數量
      // 【修正】原本用 PALETTE.slice，若資料超過 10 筆會出錯或顏色不對。
      // 改用 map 搭配 i % PALETTE.length，確保循環使用調色盤顏色
      backgroundColor: orgs.map((_, i) => hexToRgba(PALETTE[i % PALETTE.length], 0.85)),
      borderColor: '#fff', 
      borderWidth: 2,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false, 
    cutout: '60%', // 控制甜甜圈中間的空心圓大小 (60% 半徑)
    plugins: { 
      legend: {display:false}, // 隱藏預設圖例 (因為下面我們自己寫了客製化 HTML 圖例)
      tooltip: {
        // 自訂滑鼠懸浮時的提示框內容 (顯示數量與百分比)
        callbacks: { 
          label: ctx => ` ${ctx.label}：${ctx.parsed} 篇 (${((ctx.parsed / total) * 100).toFixed(1)}%)` 
        }
      }
    }
  }
});

// ==========================================
// 4. 動態生成客製化圖例 (Legend) HTML
// ==========================================
const legend = document.getElementById('donut-legend');
orgs.forEach((org, i) => {
  // 計算該項目佔比 (取小數點後一位)
  const pct = ((mentions[i] / total) * 100).toFixed(1);
  // 【修正】這裡的 PALETTE[i] 也加上了 % PALETTE.length 防護機制
  legend.innerHTML += `
    <li>
      <span class="legend-dot" style="background:${PALETTE[i % PALETTE.length]};"></span>
      <span class="legend-name">${org}</span>
      <span class="legend-pct">${mentions[i]} 篇 · ${pct}%</span>
    </li>`;
});

// ==========================================
// 5. 透過 API 獲取分類資料並繪製水平長條圖
// ==========================================



fetch('/airport/api/', {
  method: 'POST',
  headers: {
    'Content-Type':'application/x-www-form-urlencoded',
  },
  body: 'mode=category' // 告訴後端這次要抓分類 (category) 的資料
})
.then(r => r.json())
.then(data => {
  
  // 繪製分類的水平長條圖 (Horizontal Bar Chart)
  new Chart(document.getElementById('chart-category').getContext('2d'), {
    type: 'bar',
    data: {
      labels: data.categories, // Y軸：分類名稱 (例如：Dcard 的全部、感情、閒聊、機場相關等)
      datasets: [{
        label: '討論文章數',
        data: data.counts,       // X軸：文章數量
        // 【修正】同樣將顏色設定改為動態循環計算，避免分類超過 10 個時出錯
        backgroundColor: data.categories.map((_, i) => hexToRgba(PALETTE[i % PALETTE.length], 0.75)),
        borderColor: data.categories.map((_, i) => PALETTE[i % PALETTE.length]),
        borderWidth: 1.5, 
        borderRadius: 4, // 讓長條圖的邊角有微圓角效果
      }]
    },
    options: {
      indexAxis: 'y', // 關鍵設定：將 X 軸與 Y 軸對調，變成水平長條圖
      responsive: true,
      plugins: {
        legend: {display:false}, // 隱藏上方圖例 (只有單一數據集不需顯示)
        tooltip: {
          // 自訂提示框，因為是水平圖，數據取 ctx.parsed.x
          callbacks: { label: ctx => ` ${ctx.parsed.x} 篇` }
        }
      },
      scales: {
        x: {beginAtZero:true, grid:{color:'#e8eaf6'}}, // X軸格線顏色
        y: {grid:{display:false}, ticks:{font:{size:11}}} // Y軸隱藏格線，字體微調
      }
    }
  });
});
</script>
{% endblock %}
