{% extends 'base.html' %}

{% block title %}{{ active_theme }}輿情觀測 — 月度趨勢{% endblock %}

{% block extra_css %}
<style>
  .page-hero {
    background: var(--brand-gradient);
    border-radius: var(--radius-card);
    padding: 1.5rem 2rem;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1.2rem;
  }
  .hero-icon {
    width: 54px; height: 54px; flex-shrink: 0;
    background: rgba(255,255,255,0.18); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; color: #fff;
  }
  .page-hero h1 { font-size: 1.35rem; font-weight: 800; color: #fff; margin: 0; }
  .page-hero p  { color: rgba(255,255,255,0.75); margin: 0.2rem 0 0; font-size: 0.82rem; }
  .hero-badge {
    margin-left: auto; background: rgba(255,255,255,0.14);
    color: #fff; border-radius: 2rem; padding: 0.28rem 0.85rem;
    font-size: 0.73rem; white-space: nowrap;
  }
  .card-hdr {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.78rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-secondary);
  }
  .card-hdr i { color: var(--brand-color); font-size: 0.95rem; }
  .metric-row { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .metric-card {
    flex: 1; min-width: 100px;
    background: var(--bg-card-header); border: 1px solid var(--border-color);
    border-radius: var(--radius-card); padding: 0.7rem 0.9rem; text-align: center;
  }
  .metric-card .m-val { font-size: 1.45rem; font-weight: 800; color: var(--brand-color); line-height: 1.2; }
  .metric-card .m-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .rank-list { list-style: none; padding: 0; margin: 0; }
  .rank-item {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.5rem 0.4rem; border-bottom: 1px solid var(--border-color);
    font-size: 0.86rem; border-radius: 0.35rem;
    transition: background 0.12s;
  }
  .rank-item:last-child { border-bottom: none; }
  .rank-count { font-size: 0.76rem; color: var(--text-muted); white-space: nowrap; }
  .placeholder-hint {
    display: flex; align-items: center; justify-content: center;
    padding: 2.5rem 0; color: var(--text-muted); gap: 0.5rem; font-size: 0.86rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="page-hero">
  <div class="hero-icon"><i class="bi bi-graph-up-arrow"></i></div>
  <div>
    <h1>月度趨勢</h1>
    <p>各情境每月討論量堆疊長條 · 折線趨勢 · 資料摘要</p>
  </div>
  <div class="hero-badge d-none d-md-block">
    <i class="bi bi-database-fill me-1"></i>資料來源：Dcard {{ active_theme }}相關討論
  </div>
</div>

<div class="row g-3 mb-3">
  <div class="col-12">
    <div class="card">
      <div class="card-header">
        <span class="card-hdr"><i class="bi bi-graph-up-arrow"></i>各情境月度討論量（堆疊長條圖）</span>
      </div>
      <div class="card-body">
        <canvas id="chart-trend" style="max-height:380px;"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="row g-3">
  <div class="col-lg-7">
    <div class="card h-100">
      <div class="card-header">
        <span class="card-hdr"><i class="bi bi-activity"></i>各情境月度趨勢折線</span>
      </div>
      <div class="card-body">
        <canvas id="chart-trend-line" style="max-height:300px;"></canvas>
      </div>
    </div>
  </div>
  <div class="col-lg-5">
    <div class="card h-100">
      <div class="card-header">
        <span class="card-hdr"><i class="bi bi-info-circle-fill"></i>資料摘要</span>
      </div>
      <div class="card-body" id="trend-summary">
        <div class="placeholder-hint"><i class="bi bi-arrow-clockwise"></i>載入中…</div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
<script>
// ==========================================
// 1. 全域變數與輔助函式設定
// ==========================================

// 定義圖表使用的顏色調色盤 (共 10 種顏色)
const PALETTE = [
  '#3949ab','#e53935','#43a047','#fb8c00','#8e24aa',
  '#00acc1','#6d4c41','#1e88e5','#f4511e','#39796b',
];

// 將 HEX 16進位色碼 (如 #3949ab) 轉換為 RGBA 格式，以支援透明度 (alpha) 設定
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), 
        g = parseInt(hex.slice(3,5),16), 
        b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ==========================================
// 2. 獲取資料與初始化圖表
// ==========================================

// 向後端 API 發送 POST 請求，請求模式為 'trend' (趨勢資料)
fetch('/airport/api/', {
  method: 'POST',
  headers: {'Content-Type':'application/x-www-form-urlencoded'},
  body: 'mode=trend'
})
.then(r => r.json()) // 將伺服器回傳的 Response 解析為 JSON 格式
.then(data => {
  // 提取後端傳來的月份標籤與資料集
  const months   = data.months;
  const datasets = data.datasets;

  // ----------------------------------------
  // 圖表 A：繪製堆疊長條圖 (Bar Chart)
  // ----------------------------------------
  new Chart(document.getElementById('chart-trend').getContext('2d'), {
    type: 'bar',
    data: {
      labels: months, // X 軸標籤 (月份)
      // 動態生成各情境的資料結構
      datasets: datasets.map((ds, i) => ({
        label: ds.scenario, // 情境名稱 (例如：航班查詢、行李規定等)
        data: ds.data,      // 該情境在各月份的數量陣列
        // 背景色設定 80% 不透明度，邊框全彩。利用 i % PALETTE.length 確保顏色循環使用不報錯
        backgroundColor: hexToRgba(PALETTE[i % PALETTE.length], 0.8),
        borderColor: PALETTE[i % PALETTE.length],
        borderWidth: 1,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: {position:'bottom', labels:{boxWidth:12, font:{size:11}}}, // 圖例放底部
        tooltip: {mode:'index', intersect:false} // 滑鼠懸浮時顯示該月份所有情境的數據
      },
      scales: {
        // X 軸與 Y 軸皆設定為 stacked (堆疊模式)，讓同月份的數據疊加在一起
        x: {stacked:true, grid:{display:false}, ticks:{maxRotation:45}},
        y: {stacked:true, beginAtZero:true, grid:{color:'#e8eaf6'}}
      }
    }
  });

  // ----------------------------------------
  // 圖表 B：繪製折線圖 (Line Chart)
  // ----------------------------------------
  new Chart(document.getElementById('chart-trend-line').getContext('2d'), {
    type: 'line',
    data: {
      labels: months,
      datasets: datasets.map((ds, i) => ({
        label: ds.scenario,
        data: ds.data,
        borderColor: PALETTE[i % PALETTE.length],
        // 折線圖下方的填充色設為非常透明 (8%)
        backgroundColor: hexToRgba(PALETTE[i % PALETTE.length], 0.08),
        fill: false,        // 不填滿折線下方區域
        tension: 0.35,      // 設定線條的平滑度 (貝茲曲線張力)
        pointRadius: 3,     // 資料點的大小
        borderWidth: 1.8,   // 線條粗細
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: {position:'bottom', labels:{boxWidth:12, font:{size:11}}},
        tooltip: {mode:'index', intersect:false}
      },
      scales: {
        x: {grid:{display:false}, ticks:{maxRotation:45}},
        y: {beginAtZero:true, grid:{color:'#e8eaf6'}}
      }
    }
  });

  // ==========================================
  // 3. 計算數據摘要與動態生成 HTML 統計面板
  // ==========================================

  // 計算每個情境的「總文章數」，並依據總數由大到小排序
  const totalByScenario = datasets.map(ds => ({
    name: ds.scenario,
    total: ds.data.reduce((a,b) => a + b, 0) // 將該情境所有月份的數字加總
  })).sort((a, b) => b.total - a.total);

  // 計算所有情境、所有月份加總的「全局總文章數」
  const grandTotal = totalByScenario.reduce((a,b) => a + b.total, 0);

  // 找出文章數最高的那一個「巔峰月份」
  const peakMonth = (() => {
    // 算出每個月的總和陣列 (例如: [100, 150, 200...])
    const sums = months.map((_, mi) => datasets.reduce((a, ds) => a + ds.data[mi], 0));
    // 找出總和最大值的索引位置
    const maxIdx = sums.indexOf(Math.max(...sums));
    return {month: months[maxIdx], count: sums[maxIdx]}; // 回傳該月份名稱與數量
  })();

  // ----------------------------------------
  // 開始組合 HTML 字串：上方三個數據指標卡片
  // ----------------------------------------
  let html = `
    <div class="metric-row">
      <div class="metric-card">
        <div class="m-val">${grandTotal}</div>
        <div class="m-lbl">總文章數</div>
      </div>
      <div class="metric-card">
        <div class="m-val">${months.length}</div>
        <div class="m-lbl">涵蓋月份</div>
      </div>
      <div class="metric-card">
        <div class="m-val">${peakMonth.count}</div>
        <div class="m-lbl">單月最高（${peakMonth.month}）</div>
      </div>
    </div>
    <p class="mb-2" style="font-size:0.82rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;">各情境累積排行</p>
    <ul class="rank-list">
  `;

  // ----------------------------------------
  // 組合 HTML 字串：下方的各情境排行列表
  // ----------------------------------------
  totalByScenario.forEach((d, i) => {
    // 計算該情境佔總文章數的百分比 (取小數點後一位)
    const pct = ((d.total / grandTotal) * 100).toFixed(1);
    
    // 生成單一排行的列表項目 (<li>)
    // 註：這裡已加上 % PALETTE.length 確保顏色索引不會超界報錯
    html += `<li class="rank-item" style="font-size:0.82rem;">
      <span class="rank-num" style="width:1.65rem;height:1.65rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;color:#fff;flex-shrink:0;background:${PALETTE[i % PALETTE.length]};">${i+1}</span>
      <span style="flex:1;font-weight:600;">${d.name}</span>
      <span class="rank-count">${d.total} 篇 · ${pct}%</span>
    </li>`;
  });
  html += `</ul>`;

  // 將組合好的 HTML 渲染到畫面上的指定區塊中
  document.getElementById('trend-summary').innerHTML = html;
});
</script>
{% endblock %}
